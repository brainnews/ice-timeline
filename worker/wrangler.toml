name = "ice-timeline-review"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Deploy with:
#   cd worker && npx wrangler deploy
#
# Set secrets after first deploy:
#   npx wrangler secret put WEBHOOK_SECRET
#   npx wrangler secret put GH_TOKEN
#
# WEBHOOK_SECRET: any long random string — must match the WEBHOOK_SECRET
#                 GitHub Actions secret used by send-email.js
# GH_TOKEN:       GitHub Personal Access Token with Actions > Read and write permissions
#                 (Settings > Developer settings > Personal access tokens > Fine-grained)
#                 Needs: Actions (read/write) on the brainnews/ice-timeline repo

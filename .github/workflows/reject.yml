name: Reject Timeline Proposal

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Proposal filename (e.g. 2026-03-15-ice-incident.json)'
        required: true
        type: string

jobs:
  reject:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Delete proposal and commit
        run: |
          FILEPATH="proposals/${{ inputs.file }}"
          if [ ! -f "$FILEPATH" ]; then
            echo "Error: $FILEPATH not found"
            exit 1
          fi
          rm "$FILEPATH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proposals/
          git commit -m "chore: reject proposal ${{ inputs.file }}"
          git push
          echo "Rejected and deleted $FILEPATH"

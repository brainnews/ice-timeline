name: Scan for ICE Timeline News

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:       # Allow manual trigger from the Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Prune stale proposals (>28 days)
        run: |
          CUTOFF=$(date -u -d '28 days ago' +%Y-%m-%d)
          PRUNED=0
          for f in proposals/*.json; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            date_prefix=${base:0:10}
            if [[ "$date_prefix" < "$CUTOFF" ]]; then
              IMAGE_FILE=$(node -e "const p=require('./$f'); if(p.imageFile) process.stdout.write(p.imageFile)")
              rm "$f"
              if [ -n "$IMAGE_FILE" ] && [ -f "proposals-media/$IMAGE_FILE" ]; then
                rm "proposals-media/$IMAGE_FILE"
              fi
              PRUNED=$((PRUNED+1))
            fi
          done
          echo "Pruned $PRUNED stale proposal(s) (cutoff: $CUTOFF)"
          if [ "$PRUNED" -gt "0" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A proposals/ proposals-media/ 2>/dev/null || git add -A proposals/
            git commit -m "chore: prune ${PRUNED} proposal(s) older than 28 days"
            git push
          fi

      - name: Run news scan
        id: scan
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Exit 0 = proposals found, exit 1 = nothing found (scan-news.js convention)
        run: node scan-news.js && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Commit new proposals
        if: steps.scan.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proposals/ proposals-media/ 2>/dev/null || git add proposals/
          COUNT=$(git diff --cached --name-only -- 'proposals/*.json' | wc -l | tr -d ' ')
          if [ "$COUNT" -gt "0" ]; then
            git commit -m "chore: add ${COUNT} news scan proposal(s) [$(date +%Y-%m-%d)]"
            git push
            echo "Committed $COUNT proposal(s)"
          else
            echo "No new proposal files to commit"
          fi

      - name: Send review email
        if: steps.scan.outputs.found == 'true'
        working-directory: scripts
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          REVIEW_EMAIL: ${{ secrets.REVIEW_EMAIL }}
        run: node send-email.js

name: Approve Timeline Event

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Proposal filename (e.g. 2026-03-15-ice-incident.json)'
        required: true
        type: string

jobs:
  approve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Merge proposal, commit, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            node scripts/add-event.js "proposals/${{ inputs.file }}"
            git add data.js proposals/ images/
            [ -d proposals-media ] && git add proposals-media/ || true
            git commit -m "feat: add approved timeline event (${{ inputs.file }})"
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $i failed; retrying..."
            sleep 2
            if [ "$i" -eq 3 ]; then
              echo "::error::Failed to push after 3 attempts"
              exit 1
            fi
          done

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 6ecb8ffdf3296d1c7ac5faa74c80f684
        run: npx wrangler pages deploy . --project-name=ice-timeline --branch=main
